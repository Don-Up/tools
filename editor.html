<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Monaco Editor × 2 with Language Selector (Dark)</title>
    <link rel="stylesheet" href="https://esm.sh/modern-normalize@latest/modern-normalize.css" />
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e1e; color: #d4d4d4;
        }
        #header {  
            height: 38px; background: #252526; border-bottom: 1px solid #2d2d2d;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; font-size: 13px;
        }
        #container {
            display: flex; height: calc(100vh - 38px); width: 100vw;
        }
        .editor-panel {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid #2d2d2d;
        }
        .editor-panel:last-child { border-right: none; }
        .lang-selector {
            height: 32px; line-height: 32px; padding: 0 12px;
            background: #2d2d2d; border-bottom: 1px solid #3c3c3c;
            font-size: 13px; color: #cccccc;
        }
        .lang-selector select {
            background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
            padding: 2px 8px; border-radius: 3px; font-size: 13px;
            outline: none; cursor: pointer;
        }
        .editor-container {
            flex: 1; position: relative;
        }
    </style>
</head>
<body>

<div id="header">
    <span>Monaco Editor 双编辑器（暗黑主题）</span>
    <span>← Left&nbsp;&nbsp;&nbsp;Right →</span>
</div>

<div id="container">
    <!-- 左边 -->
    <div class="editor-panel">
        <div class="lang-selector">
            语言：
            <select id="lang-left">
                <option value="typescript" selected>TypeScript</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="csharp">C#</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
                <option value="markdown">Markdown</option>
                <option value="sql">SQL</option>
                <option value="plaintext">纯文本</option>
            </select>
        </div>
        <div class="editor-container" id="editor-left"></div>
    </div>

    <!-- 右边 -->
    <div class="editor-panel">
        <div class="lang-selector">
            语言：
            <select id="lang-right">
                <option value="typescript" selected>TypeScript</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="csharp">C#</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
                <option value="markdown">Markdown</option>
                <option value="sql">SQL</option>
                <option value="plaintext">纯文本</option>
            </select>
        </div>
        <div class="editor-container" id="editor-right"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.js"></script>
<script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs' } });

    require(['vs/editor/editor.main'], function () {

        const commonOptions = {
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 15,
            lineHeight: 24,
            fontFamily: 'Consolas, "Courier New", monospace',
            minimap: { enabled: true },
            scrollBeyondLastLine: false,
            roundedSelection: false,
            cursorBlinking: 'smooth',
            formatOnPaste: true,
            formatOnType: true,
            tabSize: 2,
            insertSpaces: true,
            wordWrap: 'on',
            mouseWheelZoom: true,
        };

        // 左侧编辑器
        const editorLeft = monaco.editor.create(document.getElementById('editor-left'), {
            ...commonOptions,
            value: [
                '// 左侧编辑器',
                'function hello(name) {',
                '  return `Hello ${name}!`;',
                '}',
                'console.log(hello("Monaco"));'
            ].join('\n'),
            language: 'typescript'
        });

        // 右侧编辑器
        const editorRight = monaco.editor.create(document.getElementById('editor-right'), {
            ...commonOptions,
            value: [
                '// 左侧编辑器',
                'function hello(name) {',
                '  return `Hello ${name}!`;',
                '}',
                'console.log(hello("Monaco"));'
            ].join('\n'),
            language: 'typescript'
        });

        // 语言切换函数
        function changeLanguage(editor, lang) {
            const model = editor.getModel();
            if (model) {
                monaco.editor.setModelLanguage(model, lang);
            }
        }

        // 绑定左侧下拉框
        document.getElementById('lang-left').addEventListener('change', (e) => {
            changeLanguage(editorLeft, e.target.value);
        });

        // 绑定右侧下拉框
        document.getElementById('lang-right').addEventListener('change', (e) => {
            changeLanguage(editorRight, e.target.value);
        });

    });
</script>
</body>
</html>
