<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>随机循环播放 YouTube 视频</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #player {
            width: 720px;
            height: 1280px;
        }

        #modeSelector, #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }

        #modeSelector {
            margin-top: 10px;
        }

        #controls {
            margin-top: 0px;
        }

        label {
            font-size: 16px;
            cursor: pointer;
        }

        input[type="radio"] {
            margin-right: 8px;
            cursor: pointer;
        }

        button {
            padding: 4px 8px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #progressContainer {
            width: 80%;
            cursor: pointer;
        }

        #progressBar {
            width: 100%;
            height: 5px;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
        }

        #progressBar::-webkit-progress-bar {
            background-color: #444;
        }

        #progressBar::-webkit-progress-value {
            background-color: #00aaff;
        }

        @media (max-width: 768px) {
            #player {
                width: 100%;
                height: calc(100vw * 16 / 9);
            }

            button {
                font-size: 14px;
                padding: 4px 8px;
            }
        }
    </style>
</head>

<div id="player">

</div>

    let shufflePointer = 0;

    function shufflePlaylist() {
        shuffledIndices = youtubeIDs.map((_, i) => i);
        for (let i = shuffledIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
        }
        shufflePointer = 0;
    }

    let currentIndex = 0;

    document.body.appendChild(tag);

    const currentLink = document.getElementById("currentLink");

    currentLink.addEventListener("click", () => {

            player.pauseVideo();
        }
    });

    function updateCurrentLink() {
        const currentVideoId = youtubeIDs[currentIndex];
        currentLink.href = `https://www.youtube.com/shorts/${currentVideoId}`;
    }

    function onPlayerReady(event) {
        updateCurrentLink();
        startProgressBar();
    }


    function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {

            width: "540",
            videoId: youtubeIDs[currentIndex],
            playerVars: {
                autoplay: 1,
                controls: 0,
                rel: 0,
                loop: 1,
                cc_load_policy: 1,      // ✅ 启用字幕
                cc_lang_pref: "en",// ✅ 可选：设置字幕语言（简体中文）
                hl: 'en'               // 界面语言为英文
            },
            events: {
                onReady: () => onPlayerReady, // 初次加载时更新链接
                onStateChange: onPlayerStateChange,
                // onReady: startProgressBar,
            },
        });
        shufflePlaylist();
    }

    document.getElementById("btnBackward").addEventListener("click", () => {
        player.seekTo(Math.max(player.getCurrentTime() - 2.5, 0), true);
    })

    const actionBar = document.getElementById("actionBar")

    let startTime = 0
    let endTime = 0
    let isLooping = false

    document.addEventListener("keydown", (e) => {
        if (!player || !player.getCurrentTime) return;
        const currentTime = player.getCurrentTime();
        if (e.key === "ArrowLeft" || e.key === "a") {
            player.seekTo(Math.max(currentTime - 2.5, 0), true);
        } else if (e.key === "ArrowRight" || e.key === "d") {
            player.seekTo(currentTime + 2.5, true);
        } else if (e.key === "ArrowUp") {
            e.preventDefault()
            // 上一个视频
            document.getElementById("prevButton").click();
        } else if (e.key === "ArrowDown") {
            e.preventDefault()
            // 下一个视频
            document.getElementById("nextButton").click();
        } else if (e.key === "s") {
            e.preventDefault()
            // 暂停播放
            if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        } else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault()
            const container = document.getElementById('player');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        } else if (e.key === "l") {
            e.preventDefault()
            currentLink.click()
        } else if (e.key === "h") {
            actionBar.style.visibility = actionBar.style.visibility !== "hidden" ? "hidden" : "visible"
        } else if (e.key === "1") {
            e.preventDefault()
            endTime = currentTime;
            isLooping = true;
        } else if (e.key === "2") {
            e.preventDefault()
            if (isLooping) {
                startTime = endTime;
                isLooping = false;
            }
        }
    });


    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            if (playMode === "random") playRandomVideo();
            else if (playMode === "sequential") playNextVideo();
            else if (playMode === "single") replayCurrentVideo();
        } else if (event.data === YT.PlayerState.PLAYING) {
            startProgressBar();
        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.BUFFERING) {
            clearInterval(progressInterval);
        }
    }

    function loadVideo(index) {
        currentIndex = index;
        current.textContent = `${Number(currentIndex) + 1}`;
        player.loadVideoById(youtubeIDs[currentIndex]);
        updateCurrentLink(); // ← 加这里
    }

    function playRandomVideo() {
        if (shufflePointer >= shuffledIndices.length) shufflePlaylist();
        const randomIndex = shuffledIndices[shufflePointer++];
        historyQueue.push(randomIndex);
        if (historyQueue.length > Math.floor(youtubeIDs.length / 2)) historyQueue.shift();
        loadVideo(randomIndex);
    }

    function playNextVideo() {
        currentIndex = (currentIndex + 1) % youtubeIDs.length;
        current.textContent = `${currentIndex + 1}`;
        loadVideo(currentIndex);
    }

    function playPreviousVideo() {
        currentIndex = (currentIndex - 1 + youtubeIDs.length) % youtubeIDs.length;
        current.textContent = `${currentIndex + 1}`;
        loadVideo(currentIndex);
    }

    function replayCurrentVideo() {
        player.seekTo(0, true);
        player.playVideo();
    }

    document.querySelectorAll('input[name="playMode"]').forEach(radio => {
        radio.addEventListener("change", event => (playMode = event.target.value));
    });

    document.getElementById("prevButton").addEventListener("click", () => {
        if (playMode === "random") {
            if (historyQueue.length > 1) {
                historyQueue.pop();
                loadVideo(historyQueue[historyQueue.length - 1]);
            } else alert("没有更多的历史记录！");
        } else playPreviousVideo();
    });

    document.getElementById("nextButton").addEventListener("click", () => {
        if (playMode === "random" || playMode === "single") playRandomVideo();
        else playNextVideo();
    });

    // ==============================
    // 进度条逻辑

    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");

    // 新增格式化函数
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // 在 startProgressBar 中更新 timeDisplay
    const timeDisplay = document.getElementById("timeDisplay");

    function startProgressBar() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (player && player.getDuration && player.getCurrentTime) {
                const duration = player.getDuration();
                const currentTime = player.getCurrentTime();
                const progress = (currentTime / duration) * 100;
                progressBar.value = progress;

                timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;

                if (isLooping && endTime > startTime && currentTime >= endTime) {
                    player.seekTo(startTime, true);
                }
            }
        }, 500);
    }


    progressContainer.addEventListener("click", function (e) {
        if (player && player.seekTo) {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            const duration = player.getDuration();
            const seekTo = percent * duration;
            player.seekTo(seekTo, true);
        }
    });
