<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document & TTS</title>
    <style>
        .mask-container {
            position: relative;
            background: #2c2c2c; /* Container background (optional) */
            display: flex;
            flex-direction: column;
            align-items: left;
            justify-content: center;
            overflow: hidden; /* Ensures the mask stays within bounds */
        }

        /* Grey mask (covers text by default) */
        .mask-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #363636; /* Solid grey (no transparency) */
            transition: opacity 0.3s ease;
        }

        /* Text styling (hidden by default) */
        .masked-text {
            opacity: 0; /* Start invisible */
            z-index: 1; /* Ensures text is above the mask when visible */
            transition: opacity 0.3s ease;
            color: white; /* Optional: improves readability */
        }

        /* Hover effect: Hide mask and show text */
        .mask-container:hover::before {
            display: none; /* Mask disappears */
        }

        .mask-container:hover .masked-text {
            display: block; /* Text appears */
        }

        b {
            color: orange;
        }

        .text-block {
            margin-bottom: 10px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 20px;
            font-family: "Corbel", 'Segoe UI', Tahoma, Verdana, sans-serif;
            color: #dfe1e5;
            font-weight: normal;
            display: block;
        }

        .code-span {
            color: lightskyblue !important;
        }

        li {
            cursor: pointer;
            font-size: 18px;
            font-family: "Corbel", 'Segoe UI', Tahoma, Verdana, sans-serif;
            color: #dfe1e5;
            font-weight: normal;
        }

        button {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 2px;
        }

        button:hover {
            background-color: #1565c0;
        }

        blockquote {
            margin: 10px 0;
            padding-left: 15px;
            border-left: 3px solid #1e88e5;
            color: #b0b0b0;
            background: #2f363d;
            padding: 5px 10px;
            font-size: 14px;
            font-family: "Corbel", 'Segoe UI', Tahoma, Verdana, sans-serif;
        }

        select {
            width: 145px
        }

        input {
            width: 50px
        }

        select, input {
            padding: 10px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #333;
        }

        #rateSlider {
            width: 80px;
            vertical-align: middle;
        }

        #rateValue {
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: auto;
            position: relative;
            flex-direction: column;
            background: #2b2b2b; /* rgba(18, 18, 18, 1) 背景色为 #121212，#2f363d 透明度为 0.7 */
            backdrop-filter: blur(0px);
        }

        #content {

        }

        #wrapper {
            overflow: auto;
            height: 100vh;
        }

        .controls {
            /* 设置controls为fixed以使其固定在页面顶部 */
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #212121;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            height: 60px;
            margin: 0; /* 移除外边距 */
            overscroll-behavior-x: auto;
            overflow-x: auto; /* 启用水平滚动 */
            white-space: nowrap; /* 防止子元素换行 */
        }

        /* Webkit-based browsers (Chrome, Safari, Edge) */
        #wrapper::-webkit-scrollbar,
        select::-webkit-scrollbar {
            width: 8px; /* Width of the scrollbar */
        }

        #wrapper::-webkit-scrollbar-track,
        select::-webkit-scrollbar-track {
            background: #555; /* Color of the scrollbar track */
        }

        #wrapper::-webkit-scrollbar-thumb,
        select::-webkit-scrollbar-thumb {
            background: #888; /* Color of the scrollbar thumb */
            border-radius: 4px; /* Rounded corners for the scrollbar thumb */
        }

        #wrapper::-webkit-scrollbar-thumb:hover,
        select::-webkit-scrollbar-thumb:hover {
            background: #aaa; /* Color of the scrollbar thumb on hover */
        }

        /* Firefox */
        #wrapper,
        select {
            scrollbar-width: thin; /* Thickness of the scrollbar */
            scrollbar-color: #888 #555; /* Color of the scrollbar thumb and track */
        }


        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            /* 添加padding-top以避免内容被固定的controls遮挡 */
        }

        body, html {
            margin: 0;
            padding: 0;
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;

            border: 1px solid #333;

        }

        .preposition {
            color: greenyellow; /* 设置介词为绿色 */

        }

        .relative-pronoun {
            color: #00BFFF; /* 关系代词为明亮的蓝色 */

        }

        .adverb {
            /*color: #FF69B4; !* 副词为粉色 *!*/

            font-weight: normal;
        }

        .article {
            color: #808080; /* 冠词为灰色 */
            font-weight: normal;
        }

        .be-verb, .auxiliary-verb {
            color: #808080; /* be 动词和助动词为灰色 */
            font-weight: normal;
        }

        .ing-word {
            color: #fff; /* 以 ing 结尾的单词为黄色 */
        }

        h3 {
            font-size: 20px;
            border-bottom: #00BFFF 1px solid;
            padding-bottom: 10px;
        }

        hr {
            border: 1px solid grey;
        }

        .confirm-btn {
            margin-top: 20px;
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: 100px;
        }

        .background-image {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100vw; /* 覆盖整个视口宽度 */
            height: 100vh; /* 覆盖整个视口高度 */
            background-image: url('img/bg0.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1; /* 置于底层 */
            /* 模糊度, 默认不模糊*/
            filter: blur(0px);
        }

        .background-video {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100vw; /* 覆盖整个视口宽度 */
            z-index: -1; /* 置于底层 */
            /* 模糊度, 默认不模糊*/
            filter: blur(0px);
        }

        pre {
            background: #1e1e1e;
            padding: 0px;
            border-radius: 5px;
            overflow-x: auto;
        }

        code {
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
        / / cursor: pointer;
        }

        /* 遮罩层（背景半透明） */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none; /* 初始隐藏 */
            align-items: center;
            justify-content: center;
        }

        /* 弹窗主体 */
        .modal {
            background: darkslategrey;
            padding: 5px;
            border-radius: 4px;
            width: 60vw;
            height: 60vh;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* 关闭按钮 */
        .close-btn {
            background: red;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }


        /* 定义pulse动画 */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* 主容器样式 */
        .container-anim {
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh; /* 使用视口高度代替100% */
            z-index: 100;
            top: 00px;
        }

        /* 动画元素样式 */
        .pulse-element {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* 文本样式 */
        .centered-text {
            text-align: center;
            font-style: italic;
            font-size: 2.5rem;
            line-height: 1.75rem;
        }
    </style>

<img id="imgBg" src="img/bg0.png" alt="background"
     style="object-fit: cover;position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">

<script>
    let isPlaying = false;
    let voices = [];
    let currentSpeaker = localStorage.getItem("currentSpeaker") || "Microsoft Andrew Online (Natural) - English (United States)";
    let currentVoice = null;
    let enVoice = null;
    let currentFont = localStorage.getItem("currentFont") || "Corbel";
    let bookName = null
    let doubleMode = false
    let tripleMode = false

    const soundFX = document.getElementById('soundFX');

    const containerAnim = document.querySelector(".container-anim")
    const imgBg = document.getElementById("imgBg");

    // Load image from local storage if it exists
    const savedBase64Image = localStorage.getItem('base64Image');
    if (savedBase64Image) {
        imgBg.src = savedBase64Image;
    }

    const hideReadCheckbox = document.getElementById("hideReadCheckbox");
    hideReadCheckbox.checked = localStorage.getItem("hideRead") === "true";
    hideReadCheckbox.addEventListener("change", function () {
        localStorage.setItem("hideRead", hideReadCheckbox.checked);
    });

    document.getElementById("imageInput").addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                imgBg.src = e.target.result;
                // Save the Base64 string to local storage
                localStorage.setItem('base64Image', e.target.result);
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById("selectImage").addEventListener("click", function () {
        document.getElementById("imageInput").click();
    });


    // let hostName = window.location.hostname;
    const autoPlay = document.getElementById("autoPlayCheckbox")
    autoPlay.checked = localStorage.getItem("autoPlay") === "true";
    autoPlay.addEventListener("change", function () {
        localStorage.setItem("autoPlay", autoPlay.checked);
    });

    let screenWidth = window.innerWidth;
    if (screenWidth < 1400) {
        // document.querySelector(".controls").style.gap = "10px";
        document.querySelectorAll("button").forEach((button) => {
            button.style.padding = "5px 10px";
        })
    }

    // 打开弹窗
    function openModal() {
        document.getElementById("modalOverlay").style.display = "flex";
    }

    // 关闭弹窗
    function closeModal() {
        document.getElementById("modalOverlay").style.display = "none";
    }

    // 点击遮罩层关闭弹窗
    document.getElementById("modalOverlay").addEventListener("click", function (event) {
        if (event.target === this) {
            closeModal();
        }
    });

    const contentWrapper = document.getElementById("wrapper");
    let scrollTop = 0
    // 监听页面滚动事件, 并记录当前最新滑动到的位置
    contentWrapper.addEventListener("scroll", function () {
        // 获取滚动的垂直位置
        scrollTop = contentWrapper.scrollTop;
    });

    // 在页面退出或刷新前将scrollTop保存到LocalStorage中
    window.addEventListener("beforeunload", function () {
        if (bookName) {
            localStorage.setItem(bookName, scrollTop);
        }
    });

    function loadIframe() {
        let iframe = document.getElementById("iframe");
        let url = "https://don-up.github.io/tools/md/"; // 你的网页地址
        iframe.src = url + "?t=" + new Date().getTime(); // 添加时间戳
    }

    loadIframe(); // 初次加载


    // 监听 iframe 发送的消息
    window.addEventListener("message", function (event) {
        if (event.origin === "https://don-up.github.io" && !event.data.source) {  // 确保来源正确
            bookName = event.data;
            // 关闭弹窗
            closeModal();
            getClipboardText().then(text => {
                if (text) {
                    processText(text);
                    highlightWords(rootElement);
                    document.querySelectorAll(".text-block").forEach(textBlock => {
                        textBlock.style.fontFamily = currentFont;
                    });
                    for (let element of document.getElementsByTagName("blockquote")) {
                        element.style.fontFamily = currentFont;
                    }
                    // 检查LocalStorage中是否有key为bookName, 如果有, 则获取值(滚动位置), 并将contentWrapper滚动到指定位置
                    if (localStorage.getItem(bookName)) {
                        const savedScrollTop = localStorage.getItem(bookName);
                        contentWrapper.scrollTo({
                            top: savedScrollTop,
                            behavior: "instant"
                        });
                    } else {
                        contentWrapper.scrollTo({
                            top: 0,
                            behavior: "smooth"
                        });
                    }
                } else {
                    console.log("No clipboard text retrieved.");
                }
            });
        }
    });


    const slideBlur = document.getElementById("blur-slider")
    const currentBlur = localStorage.getItem("blurValue") || 0
    slideBlur.value = currentBlur;
    imgBg.style.filter = `blur(${currentBlur}px)`;
    slideBlur.addEventListener("input", function () {
        const blurValue = this.value;
        imgBg.style.filter = `blur(${blurValue}px)`;
        localStorage.setItem("blurValue", blurValue);
        // if (document.querySelector(".background-image") !== null) {
        //     document.querySelector(".background-image").style.filter = `blur(${blurValue}px)`;
        // }
        // if (document.querySelector(".background-video") !== null) {
        //     document.querySelector(".background-video").style.filter = `blur(${blurValue}px)`;
        // }
    });

    document.getElementById("font-weight-select").value = "normal";
    document.getElementById("font-weight-select").addEventListener("change", function () {
        document.querySelectorAll(".text-block").forEach(textBlock => {
            textBlock.style.fontWeight = this.value;
        });
    });

    let scrollAnimationId = null

    let scrollSpeed = 1;

    document.getElementById("scroll-speed").addEventListener("input", function () {
        scrollSpeed = this.value;
    });

    function startScroll() {
        if (document.getElementById("btnAutoScroll").textContent === "Stop Scroll") {
            cancelAnimationFrame(scrollAnimationId);
            document.getElementById("btnAutoScroll").textContent = "Start Scroll";
        } else {
            document.getElementById("btnAutoScroll").textContent = "Stop Scroll";

            if (!contentWrapper) {
                console.error("Container element not found.");
                return;
            }

            const scrollHeight = contentWrapper.scrollHeight;
            const clientHeight = contentWrapper.clientHeight;

            // Ensure the container is scrollable
            if (scrollHeight <= clientHeight) {
                console.log("Container is not scrollable.");
                return;
            }

            let scrollTop = contentWrapper.scrollTop; // Capture the current scrollTop position

            function scrollStep() {
                if (scrollTop < scrollHeight - clientHeight) {
                    scrollTop += 0.01 * scrollSpeed; // Increment scrollTop by a small amount to simulate scrolling
                    contentWrapper.scrollTop = scrollTop;
                    scrollAnimationId = requestAnimationFrame(scrollStep);
                } else {
                    contentWrapper.scrollTop = scrollHeight - clientHeight; // Ensure it stays at the bottom
                    cancelAnimationFrame(scrollAnimationId); // Stop the animation
                    document.getElementById("btnAutoScroll").textContent = "Start Scroll"; // Change button text
                }
            }

            scrollAnimationId = requestAnimationFrame(scrollStep);
        }
    }

    document.getElementById("btnAutoScroll").addEventListener("click", startScroll);


    const selectFontFamily = document.getElementById("font-family-select");
    selectFontFamily.value = currentFont
    selectFontFamily.addEventListener("change", function () {
        currentFont = this.value;
        localStorage.setItem("currentFont", this.value);
        document.querySelectorAll(".text-block").forEach(textBlock => {
            textBlock.style.fontFamily = this.value;
        });
        document.querySelectorAll("li").forEach(textBlock => {
            textBlock.style.fontFamily = this.value;
        });
        for (let element of document.getElementsByTagName("blockquote")) {
            element.style.fontFamily = this.value;
        }
    });

    // Listen to the rate slider changes
    const rateSlider = document.getElementById("rateSlider");
    const rateValue = document.getElementById("rateValue");
    const rate = localStorage.getItem("rateValue") || 1.00
    rateValue.textContent = rate;
    rateSlider.value = rate;

    rateSlider.addEventListener("input", function () {
        rateValue.textContent = Number(this.value).toFixed(2);
        localStorage.setItem("rateValue", rateValue.textContent);
    });

    let inLeft = false
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    fullscreenBtn.addEventListener("click", function () {
        if (!inLeft) {
            container.style.marginLeft = "0px"
            inLeft = true
        } else {
            container.style.margin = "auto"
            inLeft = false
        }
        // if (!document.fullscreenElement) {
        //     document.documentElement.requestFullscreen();
        //     fullscreenBtn.textContent = "Exit";
        // } else {
        //     document.exitFullscreen();
        //     fullscreenBtn.textContent = "Full";
        // }
    });

    const toggleElement = document.getElementById("toggleElement");
    let show = true;
    document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowLeft") {
            event.preventDefault();
            if (show) {
                toggleElement.style.display = "none";
                show = false;
            } else {
                toggleElement.style.display = "flex";
                show = true;
            }
        } else if (event.key === "ArrowRight") {
            // Usage
            getClipboardText().then(text => {
                if (text) {
                    processText(text);
                    highlightWords(rootElement);
                    document.querySelectorAll(".text-block").forEach(textBlock => {
                        textBlock.style.fontFamily = currentFont;
                    });
                    document.querySelectorAll("li").forEach(textBlock => {
                        textBlock.style.fontFamily = currentFont;
                    });
                    for (let element of document.getElementsByTagName("blockquote")) {
                        element.style.fontFamily = currentFont;
                    }
                    contentWrapper.scrollTo({
                        top: 0,
                        behavior: "instant"
                    });
                } else {
                    console.log("No clipboard text retrieved.");
                }
            });

    // Function to highlight specific words within a node
    function highlightWords(node) {
        if (!cbHighlight.checked) return
        if (node.nodeType === Node.TEXT_NODE) {
            let text = node.nodeValue;
            text = text.replace(prepositionRegex, "<span class=\"preposition\">$1</span>");
            text = text.replace(relativePronounRegex, "<span class=\"relative-pronoun\">$1</span>");
            text = text.replace(adverbRegex, "<span class=\"adverb\">$&</span>");
            text = text.replace(conjunctionRegex, "<span class=\"conjunction\">$1</span>");
            text = text.replace(articleRegex, "<span class=\"article\">$1</span>");
            text = text.replace(beVerbRegex, "<span class=\"be-verb\">$1</span>");
            text = text.replace(auxiliaryVerbRegex, "<span class=\"auxiliary-verb\">$1</span>");
            text = text.replace(ingWordRegex, "<span class=\"ing-word\">$&</span>");
            if (text !== node.nodeValue) {
                const span = document.createElement("span");
                span.innerHTML = text;
                node.replaceWith(span);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== "SCRIPT" && node.tagName !== "STYLE") {
            Array.from(node.childNodes).forEach(highlightWords);
        }
    }

    function escapeMarkdownHTML(markdown) {
        return markdown.replace(/(`[^`]*`)|[<>]/g, (match, codeBlock) => {
            if (codeBlock) {
                return codeBlock; // 保持代码块不变
            }
            return match === '<' ? '&lt;' : '&gt;'; // 转义 < 和 >
        });
    }

    function markdownTableToHTML(markdown) {
        // Split the markdown into lines and trim whitespace
        const lines = markdown.trim().split('\n').map(line => line.trim());

        // Extract headers from the first line
        const headers = lines[0].split('|')
            .map(cell => cell.trim())
            .filter(cell => cell !== '');

        // Skip the separator line (second line)
        // Process the data rows (starting from line 2)
        const rows = lines.slice(2).map(line =>
            line.split('|')
                .map(cell => cell.trim())
                .filter(cell => cell !== '')
        );

        // Create HTML table
        let html = '<table border="1" style="border-collapse: collapse; width: 100%;">\n';

        // Add header row
        html += '  <thead>\n    <tr>\n';
        headers.forEach(header => {
            html += `      <th style="padding: 8px; text-align: left;">${header}</th>\n`;
        });
        html += '    </tr>\n  </thead>\n';

        // Add body rows
        html += '  <tbody>\n';
        rows.forEach(row => {
            html += '    <tr>\n';
            row.forEach(cell => {
                html += `      <td style="padding: 8px;">${cell}</td>\n`;
            });
            html += '    </tr>\n';
        });
        html += '  </tbody>\n';
        html += '</table>';

        return html;
    }

    // Modified playText function for interleaved sentence repetition.
    function playText(originalText, clickedElement, banContinuous = false, continueAnyway = false, playSelection = false) {
        // 判断ALT键是否处于按下状态, 如果是则取消播放。
        if (event.altKey || (!playSelection && window.getSelection().toString())) {
            return;
        }
        if (selectionMode) {
            isPlaying = false;
            return;
        }

        if (isPlaying) {
            speechSynthesis.cancel();
        }
        isPlaying = true;

        // 将所有<b>XX</b>替换为XX
        originalText = originalText.replace(/<b>(.*?)<\/b>/g, '$1');
        // 将所有的<span class="code-span">XX</span>替换为XX
        originalText = originalText.replace(/<span class="code-span">(.*?)<\/span>/g, '$1');

        // Gather individual sentences from the clicked element and its subsequent siblings.
        let sentences = [];
        if (originalText && originalText.trim()) {
            sentences.push(originalText.trim());
        }
        const autoPlayEnabled = autoPlay.checked;
        if (continueAnyway || (autoPlayEnabled && clickedElement && !banContinuous)) {
            let next = clickedElement.nextElementSibling;
            // if(clickedElement.tag)
            while (next) {
                if (next.dataset && next.dataset.originalText) {
                    const txt = next.dataset.originalText.trim();
                    if (txt) sentences.push(txt);
                }
                next = next.nextElementSibling;
            }
        }

        const repeatCount = parseInt(inputRepeatCount.value)


        let finalText = ''; // Ensure finalText is initialized

        if (autoPlayEnabled && !banContinuous) {//filter(sentence => !sentence.startsWith(">")).
            if (ecCheckBox.checked || eceCheckBox.checked) {
                let tempSentence = ""
                finalText = sentences.map((sentence, index) => {
                    if (sentence.startsWith(">")) {
                        const result = (ecCheckBox.checked ? `${tempSentence + sentence} ` : `${tempSentence + sentence + tempSentence} `)
                            .repeat(repeatCount)
                        tempSentence = ""
                        return result;
                    } else {
                        tempSentence += sentence + " "
                        return ""
                    }
                }).join('');
            } else {
                finalText = sentences.filter(sentence => !sentence.startsWith(">")).map(sentence => {
                    if (sentence.trim().match(/[0-9]+\.$/) && sentence.trim().startsWith("#"))
                        return ""
                    else
                        return `${sentence} `.repeat(repeatCount)
                }).join('');
            }
            // console.log("Final Text1:", finalText)
        } else {
            if (repeatCount > 0 && sentences.length > 0) {
                finalText = Array.from({length: repeatCount}, () => sentences.join(' ')).join(' ');
            }
            // console.log("Final Text2:", finalText)
        }

        // 将所有<b>XX</b>替换为XX
        finalText = finalText.replace(/<b>(.*?)<\/b>/g, '$1');
        // 将所有的<span class="code-span">XX</span>替换为XX
        finalText = finalText.replace(/<span class="code-span">(.*?)<\/span>/g, '$1');
        finalText = finalText.replace(/[()#*<>`•\/🔹✅🚀🧠🔎❌]/g, " ").trim() + " ";
        // 将列表序号1. 2. 3.修改为1, 2, 3,
        finalText = finalText.replace(/(\d+)\./g, '$1, ');
        finalText = finalText.replaceAll("&lt;", "").replaceAll("&gt;", "")

        if (doubleMode || tripleMode) {
            finalText = finalText.replaceAll("—", ", ").replace(/([?!:;,.])\s+/g, "$1\n").trim().split("\n").map((line, index) => {
                return `${line} `.repeat(tripleMode ? 3 : 2)
            }).join("").replaceAll(". ", ", ")
        }

        // console.log("Final Text:", finalText)
        const utterance = new SpeechSynthesisUtterance(finalText);
        if (hideReadCheckbox.checked && !/[\u4e00-\u9fa5]/.test(finalText)) {
            utterance.voice = enVoice;
            utterance.lang = "en-US";
            utterance.rate = 1;
        } else {
            utterance.voice = currentVoice;
            utterance.rate = parseFloat(rateSlider.value);
        }
        //
        utterance.onend = () => {
            if(playSelection){
                playText(window.getSelection().toString(), null, false, false, true)
            } else {
                isPlaying = false;
                if (!autoPlay.checked && hideReadCheckbox.checked && clickedElement) {
                    clickedElement.style.visibility = "visible";
                }
            }
        }
        utterance.onboundary = (event) => {
            // log the playing progress
            // const { charIndex, elapsedTime } = event;
            // const totalLength = finalText.length;
            // const progress = ((charIndex / totalLength) * 100).toFixed(2);
            // console.log(`Progress: ${progress}% | Char Index: ${charIndex} | Time Elapsed: ${elapsedTime}ms`);
        };
        utterance.onstart = () => {
            if (!autoPlay.checked && hideReadCheckbox.checked && clickedElement) {
                clickedElement.style.visibility = "hidden";
            }
        };
        speechSynthesis.speak(utterance);
    }

    document.addEventListener("keyup", (event) => {

                currentText = selection || currentText
                if (currentText) {
                    playText(`${currentText}, `.repeat(inputRepeatCount1.value), this)
                }
            }
        }
    })

    // 监听快捷键Space, 按下后调用stopText
    document.addEventListener("keydown", async (event) => {
        // console.log("Keydown event:", event.code)
        switch (event.code) {
            case "KeyH":
                document.querySelectorAll(".text-block").forEach(/** @param {HTMLElement} textBlock */ textBlock => {
                    if (!textBlock.classList.contains("mask-container")) {
                        textBlock.classList.add("mask-container")
                        textBlock.nextElementSibling.innerHTML = textBlock.nextElementSibling.textContent+"<br>"+textBlock.textContent
                            .replaceAll("(：", "")
                            .replaceAll(")：", "").trim()
                            .replace(/\[.*?\]/g, '')
                            .replace(/[\u4e00-\u9fff]/g, "")
                            .replace(/、/g, "")
                            .split(" ").map(word => ["...", "the", "...,", "and"].includes(word)?word:(word[0]||"")+(word.length<=2?(word[1]||""):word.length+(word.endsWith(",")?",":(word.endsWith(".")?".":(word.endsWith("?")?"?":""))))).join(" ")
                    } else {
                        textBlock.classList.remove("mask-container")
                        textBlock.nextElementSibling.textContent = textBlock.nextElementSibling.innerHTML.split("<br>")[0]
                    }
                })
                break
            case "KeyR":
                playText(window.getSelection().toString(), null, false, false, true)
                break
            case "KeyA":
            case "KeyQ":
            case "KeyS":
                selectionMode = true
                break
            case "KeyX":
                // get the text from the pasteboard
                const comments = (await getClipboardText()).split("\n")
                    .filter(t => t.trim() !== "" && t.trim().length > 20 && !t.trim().startsWith("@")).map(t =>
                        t.trim().endsWith(".") ? t : `${t.trim()}.`
                    )
                containerAnim.style.display = "flex"
                fetch("https://next-reader-psi.vercel.app/api/translate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        text: `${comments.join("\n")}`,
                        targetLang: event.altKey ? "EN" : "ZH"
                    }),
                }).then(response => response.json()).then(data => {
                    let result = []
                    const translatedTextArray = data.text.split("\n")
                    for (let i = 0; i < translatedTextArray.length; i++) {
                        if (!event.shiftKey) {
                            result.push(comments[i] + "\n> " + translatedTextArray[i] + "\n")
                        } else {
                            result.push(translatedTextArray[i] + "\n> " + comments[i] + "\n")
                        }
                    }
                    containerAnim.style.display = "none"
                    insertText(event, result.join("\n").trim())
                }).catch(error => {
                    containerAnim.style.display = "none"
                    console.error(error);
                })
                break
            case "KeyY":
                const selection = window.getSelection()
                currentText = selection || currentText
                if (currentText) {
                    playText(`${currentText}, `.repeat(3), this)
                }
                break
            case "KeyT":
                event.preventDefault()
                containerAnim.style.display = "flex"
                // get the text from the pasteboard
                let text = await getClipboardText();
                // 将所有"数字序号."转换为"数字序号:"
                text = text.split("\n").map(s => (s.startsWith("- ") || s.startsWith("* ")) ? s.substring(2) : s).join("\n")
                text = text.replace(/(\d+)\./g, '$1:').replaceAll("\n", "");
                // [.,]
                let textArray = text.trim().split(!event.altKey ? /(?<=[.?])\s+/ : /(?<=[，。？])/).filter(s =>
                    // s不为空且不是1. 2. 3. 之类的序号
                    s.trim()
                )
                if (event.altKey) {
                    textArray = textArray.map(text => text.replace(/\r/g, ''))
                }
                // 遍历textArea, 找出单个单词的元素(trim后没有空格), 将它并入到上一个元素中:
                if (!event.altKey) {
                    for (let i = 0; i < textArray.length; i++) {
                        const element = textArray[i];
                        if (!element.trim().includes(' ')) {
                            if (i > 0) {
                                textArray[i - 1] += element;
                                textArray.splice(i, 1);
                                i--;
                            }
                        } else if (element.trim().includes("e.g.,")) {
                            textArray[i] += textArray[i + 1];
                            textArray.splice(i + 1, 1);
                            i++;
                        }
                    }
                }

                text = textArray.join('\n')
                const url = "https://next-reader-psi.vercel.app/api/translate"
                const data = {
                    text: `${text}`,
                    targetLang: !event.altKey ? "ZH" : "EN"
                }
                fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(data),
                }).then(response => response.json()).then(data => {
                    let result = []
                    const translatedTextArray = data.text.split("\n")
                    for (let i = 0; i < translatedTextArray.length; i++) {
                        if (!event.shiftKey) {
                            result.push(textArray[i] + "\n> " + translatedTextArray[i] + "\n")
                        } else {
                            result.push(translatedTextArray[i] + "\n> " + textArray[i] + "\n")
                        }
                    }
                    containerAnim.style.display = "none"
                    insertText(event, result.join("\n").trim())
                }).catch(error => {
                    containerAnim.style.display = "none"
                    console.error(error);
                })
                break
            case "Space":
                event.preventDefault()
                stopText();
                if (autoPlay.checked) {
                    if (document.getElementById("btnAutoScroll").textContent === "Stop Scroll") {
                        cancelAnimationFrame(scrollAnimationId);
                        document.getElementById("btnAutoScroll").textContent = "Start Scroll";
                    }
                }
                break;
            case "KeyV": // 打开或关闭Auto Play
                // autoPlay.checked = !autoPlay.checked;
                insertText(event)
                break;
            case "KeyD":
                event.preventDefault()
                if (!isPaused && isPlaying) {
                    isPaused = true
                    window.speechSynthesis.pause()
                } else {
                    isPaused = false
                    window.speechSynthesis.resume()
                }
                break
            case "Digit2":
                doubleMode = !doubleMode
                soundFX.play()
                break
            case "Digit3":
                tripleMode = !tripleMode
                soundFX.play()
                break
        }
    });

    // document.addEventListener("DOMContentLoaded", () => {
    //     hljs.highlightAll();
    // });

    // 监听页面退出或刷新
    window.addEventListener("beforeunload", (event) => {
        // 停止播放
        stopText();
        // 停止自动滚动
        if (autoPlay.checked) {
            if (document.getElementById("btnAutoScroll").textContent === "Stop Scroll") {
                cancelAnimationFrame(scrollAnimationId);
                document.getElementById("btnAutoScroll").textContent = "Start Scroll";
            }
        }
    });

    const container = document.querySelector(".container");

    const sliderBlur = document.getElementById("blur-slider1");
    sliderBlur.value = localStorage.getItem("blur") || 0;
    sliderBlur.addEventListener("input", (event) => {
        const blur = event.target.value;
        localStorage.setItem("blur", blur);
        container.style.backdropFilter = `blur(${blur}px)`;
    });

    const slider = document.getElementById("opacity-slider");
    if (localStorage.getItem("opacity")) {
        slider.value = localStorage.getItem("opacity");
        container.style.background = `rgba(43,43,43, ${slider.value})`;
    }
    slider.addEventListener("input", (event) => {
        const opacity = event.target.value;
        localStorage.setItem("opacity", opacity);
        container.style.background = `rgba(43,43,43, ${opacity})`;
    });

    async function getClipboardText() {
        try {
            if (!navigator.clipboard) {
                throw new Error("Clipboard API not supported");
            }
            const permission = await navigator.permissions.query({name: "clipboard-read"});
            if (permission.state === "denied") {
                throw new Error("Clipboard permission denied");
            }
            const text = await navigator.clipboard.readText();
            return text;
        } catch (error) {
            console.error("Failed to read clipboard text:", error);
            return null;
        }
    }
</script>
</body>
