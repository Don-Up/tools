<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Sequence Diagram Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #paste-area {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #paste-btn {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 18px;
            transition: background-color 0.2s;
        }

        #paste-btn:hover {
            background-color: #1565c0;
        }

        .hint {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        #app {
            display: none;
            width: 100%;
            max-width: 1000px;
            flex-direction: column;
            align-items: center;
        }

        #diagram-container {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            width: calc(100vw - 60px);
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #diagram-container .mermaid {
            background-color: #2d2d2d;
            width: 100%;
        }

        #diagram-container .mermaid svg {
            max-width: 100%;
            height: auto;
        }

        #diagram-container .mermaid svg text {
            fill: #e0e0e0 !important;
        }

        #diagram-container .mermaid svg .actor-text,
        #diagram-container .mermaid svg text.actor {
            fill: #ffffff !important;
        }

        #diagram-container .mermaid svg path,
        #diagram-container .mermaid svg line,
        #diagram-container .mermaid svg polyline,
        #diagram-container .mermaid svg polygon {
            stroke: #ff9800 !important;
        }

        #diagram-container .mermaid svg .messageLine0,
        #diagram-container .mermaid svg .messageLine1 {
            stroke: #ff9800 !important;
        }

        #explanation {
            background-color: #2d2d2d;
            border-left: 4px solid #1e88e5;
            padding: 20px;
            width: calc(100vw - 40vw);
            min-height: 80px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.6;
        }

        #navigation {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        button {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #1565c0;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #voice-select {
            padding: 8px 12px;
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }

        #position {
            font-size: 18px;
            color: #e0e0e0;
            min-width: 60px;
            text-align: center;
        }

        .error {
            color: #ff6b6b;
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .format-hint {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: Consolas, monospace;
            font-size: 13px;
            white-space: pre-line;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>Mermaid Sequence Diagram Viewer</h1>

    <div id="paste-area">
        <button id="paste-btn">Paste from Clipboard</button>
        <p class="hint">Click the button to paste mermaid code and JSON explanation</p>
        <div class="format-hint">Expected format:
```mermaid
sequenceDiagram
    participant Client
    participant Server
    Client->>Server: Request
```

```json
{
    "1": "First explanation",
    "2": "Second explanation"
}
```</div>
    </div>

    <div class="error" id="error"></div>

    <div id="app">
        <div id="navigation">
            <select id="voice-select"></select>
            <label style="color: #e0e0e0; display: flex; align-items: center; gap: 5px;">
                <input type="checkbox" id="auto-play-checkbox">
                Auto Play
            </label>
            <label style="color: #e0e0e0; display: flex; align-items: center; gap: 5px;">
                Speed: <span id="speed-value">1.0</span>x
                <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1.0" style="width: 80px;">
            </label>
            <button id="first-btn">First</button>
            <button id="pre-btn">Pre</button>
            <span id="position">1/10</span>
            <button id="next-btn">Next</button>
            <button id="last-btn">Last</button>
        </div>
        <div id="explanation" style="cursor: pointer;" title="Click to speak"></div>
        <div id="diagram-container">
            <div id="diagram" class="mermaid"></div>
        </div>
    </div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        let currentIndex = 0;
        let arrows = [];
        let participants = [];
        let explanations = {};
        let totalArrows = 0;
        let currentVoice = null;

        const pasteBtn = document.getElementById('paste-btn');
        const appEl = document.getElementById('app');
        let diagramEl = document.getElementById('diagram');
        const explanationEl = document.getElementById('explanation');
        const preBtn = document.getElementById('pre-btn');
        const nextBtn = document.getElementById('next-btn');
        const firstBtn = document.getElementById('first-btn');
        const lastBtn = document.getElementById('last-btn');
        const positionEl = document.getElementById('position');
        const errorEl = document.getElementById('error');
        const pasteAreaEl = document.getElementById('paste-area');
        const autoPlayCheckbox = document.getElementById('auto-play-checkbox');
        const speedSlider = document.getElementById('speed-slider');
        const speedValueEl = document.getElementById('speed-value');
        let speechRate = parseFloat(localStorage.getItem('speechRate')) || 1.0;

        // Load saved settings
        const savedVoice = localStorage.getItem('ttsVoice');
        const savedAutoPlay = localStorage.getItem('ttsAutoPlay') === 'true';
        currentVoice = savedVoice;
        autoPlayCheckbox.checked = savedAutoPlay;
        speedSlider.value = speechRate;
        speedValueEl.textContent = speechRate.toFixed(1);

        speedSlider.addEventListener('input', () => {
            speechRate = parseFloat(speedSlider.value);
            speedValueEl.textContent = speechRate.toFixed(1);
            localStorage.setItem('speechRate', speechRate);
        });

        async function getClipboardText() {
            try {
                if (!navigator.clipboard) {
                    throw new Error("Clipboard API not supported");
                }
                const permission = await navigator.permissions.query({ name: "clipboard-read" });
                if (permission.state === "denied") {
                    throw new Error("Clipboard permission denied");
                }
                return await navigator.clipboard.readText();
            } catch (error) {
                console.error("Failed to read clipboard text:", error);
                showError("Failed to read clipboard: " + error.message);
                return null;
            }
        }

        pasteBtn.addEventListener('click', async () => {
            const text = await getClipboardText();
            if (text) {
                parseInput(text);
            }
        });

        function parseInput(text) {
            errorEl.style.display = 'none';

            const mermaidMatch = text.match(/```mermaid\s*([\s\S]*?)```/);
            const jsonMatch = text.match(/```json\s*([\s\S]*?)```/);

            if (!mermaidMatch) {
                showError('No mermaid code block found. Use ```mermaid ... ```');
                return;
            }

            let jsonStr;
            if (jsonMatch) {
                jsonStr = jsonMatch[1];
            } else {
                const bareJsonMatch = text.match(/\{[\s\S]*?"\d+"[\s\S]*?\}/);
                if (bareJsonMatch) {
                    jsonStr = bareJsonMatch[0];
                } else {
                    showError('No JSON explanation found. Use format like { "1": "explanation" }');
                    return;
                }
            }

            const mermaidCode = mermaidMatch[1];

            participants = [];
            const participantRegex = /^\s*participant\s+(.+)$/gm;
            let match;
            while ((match = participantRegex.exec(mermaidCode)) !== null) {
                participants.push(match[1].trim());
            }

            arrows = [];
            const arrowRegex = /^\s*.+->>.+$/gm;
            while ((match = arrowRegex.exec(mermaidCode)) !== null) {
                arrows.push(match[0].trim());
            }

            if (arrows.length === 0) {
                showError('No arrows found in sequence diagram');
                return;
            }

            try {
                explanations = JSON.parse(jsonStr);
            } catch (e) {
                showError('Invalid JSON format: ' + e.message);
                return;
            }

            totalArrows = arrows.length;
            currentIndex = 0;

            pasteAreaEl.style.display = 'none';
            appEl.style.display = 'flex';

            renderStep();
            autoPlayIfEnabled();
        }

        function renderStep() {
            let diagramCode = 'sequenceDiagram\n';
            participants.forEach(p => {
                diagramCode += `    participant ${p}\n`;
            });
            for (let i = 0; i <= currentIndex; i++) {
                diagramCode += `    ${arrows[i]}\n`;
            }

            const key = String(currentIndex + 1);
            explanationEl.textContent = explanations[key] || '';

            positionEl.textContent = `${currentIndex + 1}/${totalArrows}`;

            preBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === totalArrows - 1;
            firstBtn.disabled = currentIndex === 0;
            lastBtn.disabled = currentIndex === totalArrows - 1;

            // Remove existing SVG if any
            const svg = diagramEl.querySelector('svg');
            if (svg) svg.remove();

            // Create a fresh div with the same id, replacing the old one
            const parent = diagramEl.parentNode;
            const newDiagramEl = document.createElement('div');
            newDiagramEl.id = 'diagram';
            newDiagramEl.className = 'mermaid';
            newDiagramEl.textContent = diagramCode;
            parent.replaceChild(newDiagramEl, diagramEl);

            // Update the reference
            diagramEl = newDiagramEl;

            // Render with mermaid.init
            mermaid.init(newDiagramEl);

            // Highlight the latest arrow text in golden bold
            setTimeout(() => {
                const svg = diagramEl.querySelector('svg');
                if (!svg) return;
                // Find all message label texts - they contain the arrow text like "POST /articles/:articleId/comments"
                const labels = svg.querySelectorAll('.messageText, text.messageText, .edgeLabel, .messageLabel');
                if (labels.length > 0) {
                    // The last label is the current arrow's text
                    const lastLabel = labels[labels.length - 1];
                    lastLabel.style.fill = '#ffd700';
                    lastLabel.style.fontWeight = 'bold';
                    lastLabel.style.fontSize = '1.1em';
                }
            }, 100);
        }

        function nextStep() {
            if (currentIndex < totalArrows - 1) {
                currentIndex++;
                renderStep();
                autoPlayIfEnabled();
            }
        }

        function prevStep() {
            if (currentIndex > 0) {
                currentIndex--;
                renderStep();
                autoPlayIfEnabled();
            }
        }

        function firstStep() {
            currentIndex = 0;
            renderStep();
            autoPlayIfEnabled();
        }

        function lastStep() {
            currentIndex = totalArrows - 1;
            renderStep();
            autoPlayIfEnabled();
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        preBtn.addEventListener('click', prevStep);
        nextBtn.addEventListener('click', nextStep);
        firstBtn.addEventListener('click', firstStep);
        lastBtn.addEventListener('click', lastStep);

        // TTS functionality
        const voiceSelect = document.getElementById('voice-select');

        function populateVoices() {
            const voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            voices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                if (voice.name === currentVoice) {
                    option.selected = true;
                }
                voiceSelect.appendChild(option);
            });
            if (!currentVoice && voices.length > 0) {
                currentVoice = voices[0].name;
                voiceSelect.selectedIndex = 0;
            }
        }

        speechSynthesis.onvoiceschanged = populateVoices;

        voiceSelect.addEventListener('change', () => {
            currentVoice = voiceSelect.value;
            localStorage.setItem('ttsVoice', currentVoice);
        });

        autoPlayCheckbox.addEventListener('change', () => {
            localStorage.setItem('ttsAutoPlay', autoPlayCheckbox.checked);
        });

        explanationEl.addEventListener('click', () => {
            const text = explanationEl.textContent.trim();
            if (!text) return;

            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.name === currentVoice) || voices[0];
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
            utterance.rate = speechRate;
            speechSynthesis.speak(utterance);
        });

        function autoPlayIfEnabled() {
            if (autoPlayCheckbox.checked) {
                const text = explanationEl.textContent.trim();
                if (!text) return;
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const selectedVoice = voices.find(v => v.name === currentVoice) || voices[0];
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                utterance.rate = speechRate;
                speechSynthesis.speak(utterance);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (appEl.style.display === 'none') return;
            if (e.key === 'ArrowRight') {
                nextStep();
            } else if (e.key === 'ArrowLeft') {
                prevStep();
            } else if (e.key === 'ArrowUp') {
                firstStep();
            } else if (e.key === 'ArrowDown') {
                lastStep();
            }
        });
    </script>
</body>
</html>
