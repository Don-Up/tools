<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardTimer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
        }

        .input-section {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #cardNameInput {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
        }

        #cardNameInput::placeholder {
            color: #888;
        }

        #answerInput {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
        }

        #answerInput::placeholder {
            color: #888;
        }

        #durationSelect {
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            min-width: 120px;
        }

        #customDurationInput {
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            width: 80px;
            display: none;
        }

        #confirmBtn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #3a86ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #confirmBtn:hover {
            background: #2a6edc;
        }

        .timer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-card {
            background: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-card.ended {
            opacity: 0.6;
        }

        .timer-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .timer-name {
            font-size: 16px;
            font-weight: 500;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .timer-duration {
            font-size: 14px;
            color: #888;
        }

        .answer-btn {
            background: transparent;
            color: #4ade80;
            border: 1px solid #4ade80;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .answer-btn:hover {
            background: #4ade80;
            color: #121212;
        }

        .timer-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.running {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }

        .status-dot.ended {
            background: #888;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-countdown {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            min-width: 60px;
            text-align: center;
        }

        .new-min-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .new-min-btn:hover {
            color: #4ade80;
            border-color: #4ade80;
        }

        .restart-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .restart-btn:hover {
            color: #3a86ff;
            border-color: #3a86ff;
        }

        .delete-btn {
            color: #ff5252;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            min-width: 280px;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        .modal-btn.cancel {
            background: #444;
            color: #e0e0e0;
        }

        .modal-btn.confirm {
            background: #3a86ff;
            color: #fff;
        }

        .modal-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CardTimer</h1>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="cardNameInput" placeholder="Card name...">
                <input type="text" id="answerInput" placeholder="Answer (optional)">
                <select id="durationSelect">
                    <option value="60">1min</option>
                    <option value="120" selected>2min</option>
                    <option value="180">3min</option>
                    <option value="300">5min</option>
                    <option value="600">10min</option>
                    <option value="custom">Custom</option>
                </select>
                <input type="number" id="customDurationInput" placeholder="min" min="1">
            </div>
            <button id="confirmBtn">Confirm</button>
        </div>

        <div id="timerList" class="timer-list"></div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h3>New Duration (min)</h3>
            <input type="number" id="modalInput" class="modal-input" min="1">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="confirmNewDuration()">OK</button>
            </div>
        </div>
    </div>

    <script>
        let timers = [];
        let timerIntervals = {};

        const cardNameInput = document.getElementById('cardNameInput');
        const durationSelect = document.getElementById('durationSelect');
        const customDurationInput = document.getElementById('customDurationInput');
        const answerInput = document.getElementById('answerInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const timerList = document.getElementById('timerList');

        // Show/hide custom duration input
        durationSelect.addEventListener('change', () => {
            customDurationInput.style.display = durationSelect.value === 'custom' ? 'block' : 'none';
        });

        // Confirm button click handler
        confirmBtn.addEventListener('click', addTimer);

        function addTimer() {
            const name = cardNameInput.value.trim();
            if (!name) {
                alert('Please enter a card name');
                return;
            }

            let durationSeconds;
            if (durationSelect.value === 'custom') {
                const durationMin = parseInt(customDurationInput.value, 10);
                if (!durationMin || durationMin <= 0) {
                    alert('Please enter a valid duration');
                    return;
                }
                durationSeconds = durationMin * 60;
            } else {
                durationSeconds = parseInt(durationSelect.value, 10);
            }

            const answer = answerInput.value.trim();

            const timer = {
                id: Date.now(),
                name: name,
                answer: answer,
                duration: durationSeconds,
                remaining: durationSeconds,
                status: 'running'
            };

            timers.unshift(timer);
            renderTimer(timer);
            startCountdown(timer);

            // Reset inputs
            cardNameInput.value = '';
            answerInput.value = '';
            customDurationInput.value = '';
        }

        function renderTimer(timer) {
            const card = document.createElement('div');
            card.className = `timer-card ${timer.status === 'ended' ? 'ended' : ''}`;
            card.id = `timer-${timer.id}`;

            const formattedDuration = formatDuration(timer.duration);
            const statusText = timer.status === 'running' ? '倒计时中' : '已结束';
            const mins = Math.floor(timer.remaining / 60);
            const secs = timer.remaining % 60;

            const countdownHtml = timer.status === 'ended'
                ? `<span class="timer-countdown" id="countdown-${timer.id}">${mins}:${secs.toString().padStart(2, '0')}</span>`
                : `<span class="timer-countdown" id="countdown-${timer.id}">${mins}:${secs.toString().padStart(2, '0')}</span>`;

            card.innerHTML = `
                <div class="timer-info">
                    <span class="timer-name" title="${timer.name}" onclick="copyToClipboard('${timer.name}')" style="cursor:pointer">${timer.name}</span>
                    <span class="timer-duration">${formattedDuration}</span>
                </div>
                <div class="timer-status">
                    ${countdownHtml}
                    <span class="status-dot ${timer.status}"></span>
                    <span>${statusText}</span>
                </div>
                ${timer.status === 'ended' && timer.answer ? `<button class="answer-btn" onclick="showAnswer(${timer.id})">Answer</button>` : ''}
                ${timer.status === 'ended' ? `<button class="new-min-btn" onclick="openNewMinModal(${timer.id})">New Min</button>` : ''}
                <button class="restart-btn" onclick="restartTimer(${timer.id})">Restart</button>
                <button class="delete-btn" onclick="deleteTimer(${timer.id})">&times;</button>
            `;

            timerList.insertBefore(card, timerList.firstChild);
        }

        function startCountdown(timer) {
            // Store the start time and expected end time for accuracy
            timer.startTime = Date.now();
            timer.endTime = Date.now() + timer.remaining * 1000;

            timerIntervals[timer.id] = setInterval(() => {
                // Calculate remaining time based on actual elapsed time
                const now = Date.now();
                const remaining = Math.max(0, Math.ceil((timer.endTime - now) / 1000));
                timer.remaining = remaining;

                const countdownEl = document.getElementById(`countdown-${timer.id}`);
                if (countdownEl) {
                    countdownEl.textContent = formatTime(remaining);
                }

                if (remaining <= 0) {
                    clearInterval(timerIntervals[timer.id]);
                    timer.status = 'ended';
                    onTimerEnd(timer);
                }
            }, 250); // Update more frequently for smoother display
        }

        function onTimerEnd(timer) {
            // Re-render the timer card to show/hide buttons properly
            const card = document.getElementById(`timer-${timer.id}`);
            if (card) {
                card.remove();
            }
            renderTimer(timer);

            // TTS speak card name twice
            speakTwice(timer.name);
        }

        function speakTwice(text) {
            if ('speechSynthesis' in window) {
                const hasChinese = /[一-鿿]/.test(text);
                const lang = hasChinese ? 'zh-CN' : 'en-US';

                const speakOnce = () => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    speechSynthesis.speak(utterance);
                };

                speakOnce();
                setTimeout(speakOnce, 1500);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatDuration(seconds) {
            if (seconds >= 60) {
                const mins = Math.floor(seconds / 60);
                return mins > 1 ? `${mins}min` : '1min';
            }
            return `${seconds}s`;
        }

        function restartTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer) return;

            // Clear existing interval
            if (timerIntervals[id]) {
                clearInterval(timerIntervals[id]);
            }

            // Reset timer state using the current (possibly edited) duration
            timer.remaining = timer.duration;
            timer.status = 'running';

            // Re-render the timer card to update button visibility
            const card = document.getElementById(`timer-${id}`);
            if (card) {
                card.remove();
            }
            renderTimer(timer);

            // Start countdown
            startCountdown(timer);
        }

        function deleteTimer(id) {
            if (timerIntervals[id]) {
                clearInterval(timerIntervals[id]);
                delete timerIntervals[id];
            }
            timers = timers.filter(t => t.id !== id);
            const card = document.getElementById(`timer-${id}`);
            if (card) {
                card.remove();
            }
        }

        function showAnswer(id) {
            const timer = timers.find(t => t.id === id);
            if (timer && timer.answer) {
                alert(timer.answer);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Optional: brief visual feedback could be added here
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        let currentEditTimerId = null;

        function openNewMinModal(id) {
            currentEditTimerId = id;
            const modal = document.getElementById('modalOverlay');
            const input = document.getElementById('modalInput');
            const timer = timers.find(t => t.id === id);
            if (timer) {
                input.value = Math.ceil(timer.duration / 60);
            }
            modal.classList.add('active');
            input.focus();
            input.select();
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('active');
            currentEditTimerId = null;
        }

        function confirmNewDuration() {
            if (currentEditTimerId === null) return;

            const input = document.getElementById('modalInput');
            const mins = parseInt(input.value, 10);
            if (!mins || mins <= 0) {
                alert('Please enter a valid duration');
                return;
            }

            const timer = timers.find(t => t.id === currentEditTimerId);
            if (timer) {
                timer.duration = mins * 60;
                timer.remaining = timer.duration;
                timer.status = 'running';

                // Re-render the timer card
                const card = document.getElementById(`timer-${timer.id}`);
                if (card) {
                    card.remove();
                }
                renderTimer(timer);

                // Auto restart the countdown
                startCountdown(timer);
            }

            closeModal();
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });
    </script>
</body>
</html>
