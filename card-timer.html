<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardTimer</title>
    <style>
        b {
            color:yellow;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }

        .input-section {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            margin-top: 15px;
        }

        #cardNameInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
        }

        #cardNameInput::placeholder {
            color: #888;
        }

        #answerInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
        }

        #answerInput::placeholder {
            color: #888;
        }

        #durationSelect {
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            min-width: 80px;
        }

        #customDurationInput {
            padding: 12px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            width: 80px;
            display: none;
        }

        #confirmBtn {
            width: calc(100% - 110px);
            padding: 12px;
            font-size: 16px;
            background: #3a86ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #confirmBtn:hover {
            background: #2a6edc;
        }

        #exportBtn {
            width: 100px;
            padding: 12px;
            font-size: 16px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #exportBtn:hover {
            background: #555;
        }

        .timer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-card {
            background: #2e2e2e;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0.7;
            cursor: pointer;
        }

        .timer-card.promoted {
            background: #1d3d1d;
            border: 1px solid #4ade80;
        }

        .timer-card.pinned {
            background: #2f2f2f;
            border: none;
        }

        .timer-card.pinned.focus-mode {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 100;
            opacity: 1;
        }

        .timer-card.hidden-card {
            display: none;
        }

        .timer-card.ended {
            opacity: 1;
        }

        .timer-card.forced-visible {
            display: flex;
        }

        .timer-list.focus-mode .timer-card:not(.pinned) {
            display: none;
        }

        .timer-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .timer-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .btn-row-top {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-row-bottom {
            margin-top: 4px;
            gap: 8px;
        }

        .timer-right button:not(.delete-btn) {
            min-width: 60px;
        }

        .quick-min-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            width: 20px;
        }

        .quick-min-btn:hover {
            color: #4ade80;
            border-color: #4ade80;
        }

        .timer-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer-name {
            font-size: 14px;
            font-weight: 500;
            max-width: 200px;
            min-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: wrap;
            max-lines: 3;
            color: white;
        }

        .timer-duration {
            font-size: 14px;
            color: #888;
            width: 30px;
        }

        .answer-btn {
            background: transparent;
            color: #4ade80;
            border: 1px solid #4ade80;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .answer-btn:hover {
            background: #4ade80;
            color: #121212;
        }

        .timer-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            width: 140px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.running {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }

        .status-dot.ended {
            background: #888;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .timer-countdown {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            width: 60px;
            text-align: center;
        }

        .timer-countdown.hidden {
            display: none;
        }

        .new-min-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .new-min-btn:hover {
            color: #4ade80;
            border-color: #4ade80;
        }

        .restart-btn {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        .restart-btn:hover {
            color: #3a86ff;
            border-color: #3a86ff;
        }

        .delete-btn {
            background: #eeeeee;
            color: #ff5252;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 18px;
            margin-left: auto;
            border-radius: 3px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            min-width: 280px;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        .modal-btn.cancel {
            background: #444;
            color: #e0e0e0;
        }

        .modal-btn.confirm {
            background: #3a86ff;
            color: #fff;
        }

        .modal-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 onclick="handleTitleClick(event)">Card Timer <span id="timerStatus" style="font-size:14px;color:#888;font-weight:normal"></span> <label id="ttsToggle" style="cursor:pointer;font-size:14px;color:#888;font-weight:normal"><input type="checkbox" id="ttsSwitch" checked style="margin-left:8px"> TTS</label></h1>

    <div class="input-section">
        <input type="text" id="cardNameInput" placeholder="Card name...">
        <div class="input-row">
            <input type="text" id="answerInput" placeholder="Answer (optional)">
            <select id="durationSelect">
                <option value="0">0min</option>
                <option value="60">1min</option>
                <option value="120" selected>2min</option>
                <option value="180">3min</option>
                <option value="300">5min</option>
                <option value="600">10min</option>
                <option value="custom">Custom</option>
            </select>
            <label style="color:#888;padding:12px 0 12px 10px;white-space:nowrap">Def New</label>
            <input type="number" id="defNewMinInput" value="10" min="1"
                   style="width:60px;padding:12px;font-size:16px;background:#2c2c2c;color:#e0e0e0;border:1px solid #444;border-radius:4px">
            <input type="checkbox" id="defNewMinCheckbox" checked style="margin-left:5px">
            <input type="number" id="customDurationInput" placeholder="min" min="1">
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="confirmBtn">Confirm</button>
            <button id="exportBtn">Export</button>
        </div>
    </div>

    <div id="timerList" class="timer-list"></div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3>New Duration (min)</h3>
        <input type="number" id="modalInput" class="modal-input" min="1">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn confirm" onclick="confirmNewDuration()">OK</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal">
        <h3>Edit Card</h3>
        <input type="text" id="editNameInput" class="modal-input" placeholder="Card name">
        <input type="text" id="editAnswerInput" class="modal-input" placeholder="Answer (optional)">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeEditModal()">Cancel</button>
            <button class="modal-btn confirm" onclick="confirmEdit()">OK</button>
        </div>
    </div>
</div>

<script>
    let timers = [];
    let timerIntervals = {};

    const cardNameInput = document.getElementById('cardNameInput');
    const durationSelect = document.getElementById('durationSelect');
    const customDurationInput = document.getElementById('customDurationInput');
    const answerInput = document.getElementById('answerInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const exportBtn = document.getElementById('exportBtn');
    const timerList = document.getElementById('timerList');

    let isFocusMode = false;
    let isCountdownVisible = true;
    let isTimerHidden = false;
    let isTtsEnabled = localStorage.getItem('ttsEnabled') !== 'false';

    // Initialize TTS switch
    document.getElementById('ttsSwitch').checked = isTtsEnabled;
    document.getElementById('ttsSwitch').addEventListener('change', (e) => {
        isTtsEnabled = e.target.checked;
        localStorage.setItem('ttsEnabled', isTtsEnabled);
    });

    function updateTimerStatus() {
        const running = timers.filter(t => t.status === 'running').length;
        const ended = timers.filter(t => t.status === 'ended').length;
        document.getElementById('timerStatus').textContent = `(${running} 倒计时中, ${ended} 已结束)`;
    }

    // Initialize status display
    updateTimerStatus();

    // Click on timer card
    timerList.addEventListener('click', (e) => {
        const card = e.target.closest('.timer-card');
        if (!card) return;

        const timerId = parseInt(card.id.replace('timer-', ''));
        const timer = timers.find(t => t.id === timerId);
        if (!timer) return;

        // Ctrl+click: delete timer
        if (e.ctrlKey) {
            e.preventDefault();
            deleteTimer(timerId);
            return;
        }

        // Only ended timers can be pinned/promoted
        if (timer.status !== 'ended') return;

        const isAltKey = e.altKey;

        if (isAltKey) {
            // Alt+click: green background, move to bottom
            if (isFocusMode) {
                isFocusMode = false;
                timerList.classList.remove('focus-mode');
            }
            timer.isPromoted = !timer.isPromoted;
            timer.isPinned = false;
            card.classList.remove('pinned');
            if (timer.isPromoted) {
                card.classList.add('promoted');
                timerList.appendChild(card);
            } else {
                card.classList.remove('promoted');
                const firstPromoted = timerList.querySelector('.timer-card.promoted');
                if (firstPromoted) {
                    timerList.insertBefore(card, firstPromoted);
                } else {
                    timerList.appendChild(card);
                }
            }
        } else {
            // Regular click: blue background, move to top or toggle focus mode
            if (timer.isPinned && !timer.isPromoted) {
                // Toggle focus mode
                isFocusMode = !isFocusMode;
                if (isFocusMode) {
                    timerList.classList.add('focus-mode');
                } else {
                    timerList.classList.remove('focus-mode');
                }
                return;
            }

            timer.isPinned = !timer.isPinned;
            timer.isPromoted = false;
            card.classList.remove('promoted');

            if (timer.isPinned) {
                // Unpin any other pinned items first
                timers.forEach(t => {
                    if (t.id !== timerId && t.isPinned) {
                        t.isPinned = false;
                        const otherCard = document.getElementById(`timer-${t.id}`);
                        if (otherCard) otherCard.classList.remove('pinned');
                    }
                });
                // Enable focus mode for new pinned card
                isFocusMode = true;
                timerList.classList.add('focus-mode');
                card.classList.add('pinned');
                timerList.insertBefore(card, timerList.firstChild);
            } else {
                isFocusMode = false;
                timerList.classList.remove('focus-mode');
                card.classList.remove('pinned');
                const firstNonPinned = [...timerList.querySelectorAll('.timer-card')].find(c => !c.classList.contains('pinned') && !c.classList.contains('promoted'));
                if (firstNonPinned) {
                    timerList.insertBefore(card, firstNonPinned);
                } else {
                    timerList.appendChild(card);
                }
            }
        }
    });

    // Show/hide custom duration input
    durationSelect.addEventListener('change', () => {
        customDurationInput.style.display = durationSelect.value === 'custom' ? 'block' : 'none';
    });

    // Confirm button click handler
    confirmBtn.addEventListener('click', (e) => addTimer(e));

    exportBtn.addEventListener('click', () => {
        const names = timers.map(t => t.originalName).join('|||');
        navigator.clipboard.writeText(names).then(() => {
            // Optional: brief visual feedback could be added
        }).catch(err => {
            console.error('Failed to copy:', err);
        });
    });

    function addTimer(e) {
        if (e.altKey) {
            getClipboardText().then(text => {
                if (!text) {
                    alert('Please enter a card name');
                    return;
                }

                const cardNames = text.split("|||")
                createTimersWithDelay(cardNames)

                // Reset inputs
                cardNameInput.value = '';
                answerInput.value = '';
                customDurationInput.value = '';
            })
        } else {
            let name = cardNameInput.value.trim();
            if (!name) {
                alert('Please enter a card name');
                return;
            }

            createTimer(name)

            // Reset inputs
            cardNameInput.value = '';
            answerInput.value = '';
            customDurationInput.value = '';
        }

    }

    function createTimersWithDelay(cardNames, delay = 100) {
        let index = 0;

        function createNext() {
            if (index < cardNames.length) {
                createTimer(cardNames[index]);
                index++;
                setTimeout(createNext, delay);
            }
        }

        createNext();
    }

    const stopWords = [
        // 冠词
        'a', 'an', 'the',
        // 介词
        'of', 'to', 'in', 'on', 'at', 'with', 'without', 'by', 'from', 'into',
        'through', 'during', 'via', 'per', 'for',
        // 连接词
        'and', 'or', 'but', 'so', 'because', 'if', 'then', 'else',
        'when', 'while', 'where', 'that', 'which', 'who', 'whom',
        // 助动词/be动词
        'is', 'are', 'was', 'were', 'be', 'been', 'being',
        'have', 'has', 'had', 'having', 'do', 'does', 'did', 'doing',
        'can', 'could', 'will', 'would', 'should', 'may', 'might', 'must',
        // 代词
        'it', 'they', 'we', 'you', 'he', 'she', 'this', 'that',
        'these', 'those', 'there', 'their', 'them', 'us', 'our',
        'your', 'his', 'her',
        // 高频副词/形容词
        'not', 'no', 'so', 'very', 'too', 'also', 'only', 'just',
        'even', 'such', 'same', 'different', 'other', 'another'
    ]

    function createTimer(name) {
        let durationSeconds;
        if (durationSelect.value === 'custom') {
            const durationMin = parseInt(customDurationInput.value, 10);
            if (!durationMin || durationMin <= 0) {
                alert('Please enter a valid duration');
                return;
            }
            durationSeconds = durationMin * 60;
        } else {
            durationSeconds = parseInt(durationSelect.value, 10);
        }

        let answer = answerInput.value.trim();
        const originalName = name

        if (name.includes("~~") || name.includes("::")) {
            if (name.includes("::") && !name.includes("~~")) {
                const subNames = name.split("::")
                name = subNames[0].trim() + "::" + `~${subNames[1].trim()}~~`
            }
            // 1. 提取所有 {{...}} 里的内容
            const matches = [...name.matchAll(/~(.*?)~~/g)].map(m => m[1]);
            // matches = ["extracting", "arrays", "objects"]

            // 2. 把 {{...}} 替换成 ____
            if (name.includes(" → ") || name.includes(" / ")) {
                name = name.replace(/~.*?~~/g, '____');
                matches.forEach(match => {
                    name = name.replace("____", match2result(match))
                })
            } else {
                name = name.replace(/~.*?~~/g, '____');
            }

            // 3. 拼成想要的格式
            answer = matches.map(word => `"${word.startsWith("*") || word.startsWith("^") ? word.slice(1) : word}"`).join(', ');
        } else if (name.includes("英") && name.includes("美")) {
            const array = name.split("\n")
            name = array[2]
            answer = array[0] + array[1]
        }


        const timer = {
            id: Date.now(),
            name: name.replaceAll("<{", "<b>").replaceAll("}>",  "</b>").replaceAll("\"", "'"),
            originalName: originalName,
            answer: answer,
            duration: durationSeconds,
            remaining: durationSeconds,
            status: 'running',
            isNameHidden: false,
            isPinned: false,
            isPromoted: false
        };

        timers.unshift(timer);
        renderTimer(timer);

        if (durationSeconds === 0) {
            // Immediately end timer for 0 second duration
            timer.remaining = 0;
            timer.status = 'ended';
            onTimerEnd(timer);
        } else {
            startCountdown(timer);
        }
        updateTimerStatus();
    }

    function getName(timer) {
        if(timer.name.includes("::")){
            const names = timer.name.split('::')
            const first = names[0]
            let second = names[1]
            if (names[1].includes("→")) {
                const secondNames = names[1].replace("→", "").split("→")
                second = `<span style="color:lightgreen;">${secondNames[0]}</span>` + "<br>" + `<span">${secondNames[1]}</span>`
            }
            return timer.name.includes("::") ? `<span style="color:gold;max-lines: 2;text-overflow: ellipsis">${first}</span>` + "<br>" + second : timer.name
        } else {
            return timer.name
        }
    }

    function renderTimer(timer) {
        const card = document.createElement('div');
        card.className = `timer-card ${timer.status === 'ended' ? 'ended' : ''}`;
        card.id = `timer-${timer.id}`;

        // Apply visibility flags to new cards
        if (isTimerHidden && timer.status !== 'ended') {
            card.classList.add('hidden-card');
        } else if (isTimerHidden && timer.status === 'ended') {
            card.classList.add('forced-visible');
        }

        const formattedDuration = formatDuration(timer.duration);
        const statusText = timer.status === 'running' ? '倒计时中' : (timer.duration >= 600 ? 'OVER' : '已结束');
        const mins = Math.floor(timer.remaining / 60);
        const secs = timer.remaining % 60;
        const countdownClass = isCountdownVisible ? '' : ' hidden';

        const countdownHtml = timer.status === 'ended'
            ? `<span class="timer-countdown${countdownClass}" id="countdown-${timer.id}">${mins}:${secs.toString().padStart(2, '0')}</span>`
            : `<span class="timer-countdown${countdownClass}" id="countdown-${timer.id}">${mins}:${secs.toString().padStart(2, '0')}</span>`;

        const nameDisplay = timer.status === 'ended' ? (timer.isNameHidden ? 'none' : 'inline') : 'none';
        card.innerHTML = `
                <div class="timer-left">
                    <div class="timer-info">
                        <span class="timer-name" title="${timer.name}" onclick="handleNameClick(${timer.id}, event)" style="cursor:pointer;display:${nameDisplay}">
${getName(timer)}
</span>
                        <span class="timer-duration" onclick="toggleTimerName(${timer.id})" style="cursor:pointer;user-select:none">${formattedDuration}</span>
                    </div>
                    <div class="timer-status">
                        ${countdownHtml}
                        <span class="status-dot ${timer.status}"></span>
                        <span>${statusText}</span>
                    </div>
                </div>
                <div class="timer-right">
                    <div class="btn-row-top">
                        ${timer.status === 'ended' && timer.answer ? `<button class="answer-btn" onclick="showAnswer(${timer.id}, event)">Answer</button>` : ''}
                        ${timer.status === 'ended' ? `<button class="new-min-btn" onclick="openNewMinModal(${timer.id})">New Min</button>` : ''}
                        <button class="restart-btn" onclick="restartTimer(${timer.id})">Restart</button>
                        <button class="delete-btn" onclick="deleteTimer(${timer.id})">&times;</button>
                    </div>
                    ${timer.status === 'ended' ? `
                    <div class="btn-row-bottom">
                        <button class="quick-min-btn" onclick="quickRestart(${timer.id}, 1)">1m</button>
                        <button class="quick-min-btn" onclick="quickRestart(${timer.id}, 2)">2m</button>
                        <button class="quick-min-btn" onclick="quickRestart(${timer.id}, 5)">5m</button>
<!--                        <button class="quick-min-btn" onclick="quickRestart(${timer.id}, 10)">10m</button>-->
                    </div>
                    ` : ''}
                </div>
            `;

        // Insert card based on pinned/promoted state
        if (timer.isPinned) {
            // Only one pinned allowed - remove others
            timers.forEach(t => {
                if (t.id !== timer.id && t.isPinned) {
                    t.isPinned = false;
                    const otherCard = document.getElementById(`timer-${t.id}`);
                    if (otherCard) otherCard.classList.remove('pinned');
                }
            });
            card.classList.add('pinned');
            timerList.insertBefore(card, timerList.firstChild);
        } else if (timer.isPromoted) {
            card.classList.add('promoted');
            timerList.appendChild(card);
        } else {
            // Insert below pinned, before promoted
            const firstPromoted = timerList.querySelector('.timer-card.promoted');
            const firstPinned = timerList.querySelector('.timer-card.pinned');
            if (firstPromoted) {
                timerList.insertBefore(card, firstPromoted);
            } else if (firstPinned) {
                // Insert after pinned
                timerList.insertBefore(card, firstPinned.nextSibling);
            } else {
                timerList.insertBefore(card, timerList.firstChild);
            }
        }
    }

    function startCountdown(timer) {
        // Store the start time and expected end time for accuracy
        timer.startTime = Date.now();
        timer.endTime = Date.now() + timer.remaining * 1000;

        timerIntervals[timer.id] = setInterval(() => {
            // Calculate remaining time based on actual elapsed time
            const now = Date.now();
            const remaining = Math.max(0, Math.ceil((timer.endTime - now) / 1000));
            timer.remaining = remaining;

            const countdownEl = document.getElementById(`countdown-${timer.id}`);
            if (countdownEl) {
                countdownEl.textContent = formatTime(remaining);
            }

            if (remaining <= 0) {
                clearInterval(timerIntervals[timer.id]);
                timer.status = 'ended';
                onTimerEnd(timer);
            }
        }, 250); // Update more frequently for smoother display
    }

    function onTimerEnd(timer) {
        // Mark as ended BEFORE re-rendering so the card gets correct styling
        timer.status = 'ended';

        // Re-render the timer card to show/hide buttons properly
        const card = document.getElementById(`timer-${timer.id}`);
        if (card) {
            card.remove();
        }
        renderTimer(timer);

        // If timer list is hidden and timer just ended, show it
        if (isTimerHidden) {
            const newCard = document.getElementById(`timer-${timer.id}`);
            if (newCard) {
                newCard.classList.add('forced-visible');
            }
        }

        // TTS speak card name twice
        if (isTtsEnabled) {
            speakOnce(timer.name);
        }
        updateTimerStatus();
    }

    function speakOnce(text) {
        if(!text) return
        if (text.includes("::")) {
            text = text.split("::")[0]
        }
        if ('speechSynthesis' in window) {
            const hasChinese = /[一-鿿]/.test(text);
            const lang = hasChinese ? 'zh-CN' : 'en-US';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            speechSynthesis.speak(utterance);
        }
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function formatDuration(seconds) {
        if (seconds >= 60) {
            const mins = Math.floor(seconds / 60);
            return mins > 1 ? `${mins}min` : '1min';
        }
        return `${seconds}s`;
    }

    function restartTimer(id) {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;

        // Clear existing interval
        if (timerIntervals[id]) {
            clearInterval(timerIntervals[id]);
        }

        // Reset timer state using the current (possibly edited) duration
        timer.remaining = timer.duration;
        timer.status = 'running';

        // If this was the pinned card, exit focus mode
        if (timer.isPinned) {
            timer.isPinned = false;
            isFocusMode = false;
            timerList.classList.remove('focus-mode');
        }

        // Re-render the timer card to update button visibility
        const card = document.getElementById(`timer-${id}`);
        if (card) {
            card.remove();
        }
        renderTimer(timer);

        // Start countdown
        startCountdown(timer);
        updateTimerStatus();
    }

    function quickRestart(id, mins) {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;

        // Clear existing interval
        if (timerIntervals[id]) {
            clearInterval(timerIntervals[id]);
        }

        // Set new duration
        timer.duration = mins * 60;
        timer.remaining = timer.duration;
        timer.status = 'running';

        // If this was the pinned card, exit focus mode
        if (timer.isPinned) {
            timer.isPinned = false;
            isFocusMode = false;
            timerList.classList.remove('focus-mode');
        }

        // Re-render the timer card to update button visibility
        const card = document.getElementById(`timer-${id}`);
        if (card) {
            card.remove();
        }
        renderTimer(timer);

        // Start countdown
        startCountdown(timer);
        updateTimerStatus();
    }

    function deleteTimer(id) {
        const timer = timers.find(t => t.id === id);
        const wasPinned = timer && timer.isPinned;

        if (timerIntervals[id]) {
            clearInterval(timerIntervals[id]);
            delete timerIntervals[id];
        }
        timers = timers.filter(t => t.id !== id);
        const card = document.getElementById(`timer-${id}`);
        if (card) {
            card.remove();
        }

        // If the deleted card was pinned, exit focus mode
        if (wasPinned) {
            isFocusMode = false;
            timerList.classList.remove('focus-mode');
        }
        updateTimerStatus();
    }

    function showAnswer(id, e) {
        if (e) e.stopPropagation();
        const timer = timers.find(t => t.id === id);
        if (timer && timer.answer) {
            alert(timer.answer);
        }
    }

    function toggleTimerName(id) {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;

        const nameEl = document.querySelector(`#timer-${id} .timer-name`);
        if (!nameEl) return;

        // Toggle based on current display state
        const isCurrentlyHidden = nameEl.style.display === 'none';
        nameEl.style.display = isCurrentlyHidden ? 'inline' : 'none';
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            // Optional: brief visual feedback could be added here
        }).catch(err => {
            console.error('Failed to copy:', err);
        });
    }

    function handleNameClick(id, e) {
        e.preventDefault()
        // e.stopPropagation()
        const timer = timers.find(t => t.id === id);
        if (!timer) return;
        if (e.button === 0 && e.ctrlKey) {
            // Middle-click + Alt: open edit modal
            e.preventDefault();
            e.stopPropagation()
            openEditModal(id);
        } else if (e.button === 0) {
            // Left click: copy to clipboard
            copyToClipboard(timer.name);
        }
    }

    function toggleCountdownVisibility() {
        isCountdownVisible = !isCountdownVisible;
        document.querySelectorAll('.timer-countdown').forEach(el => {
            el.classList.toggle('hidden', !isCountdownVisible);
        });
    }

    function handleTitleClick(e) {
        if (e.altKey) {
            // Alt+click: toggle timer list visibility (only affects running timers)
            e.preventDefault();
            isTimerHidden = !isTimerHidden;
            document.querySelectorAll('.timer-card').forEach(card => {
                const timerId = parseInt(card.id.replace('timer-', ''));
                const timer = timers.find(t => t.id === timerId);
                if (isTimerHidden && timer && timer.status !== 'ended') {
                    card.classList.add('hidden-card');
                } else {
                    card.classList.remove('hidden-card');
                    card.classList.remove('forced-visible');
                }
            });
        } else {
            // Regular click: toggle countdown visibility
            toggleCountdownVisibility();
        }
    }

    function openNewMinModal(id) {
        const defNewMinCheckbox = document.getElementById('defNewMinCheckbox');
        const defNewMinInput = document.getElementById('defNewMinInput');

        if (defNewMinCheckbox && defNewMinCheckbox.checked) {
            // Apply default duration directly without modal
            const mins = parseInt(defNewMinInput.value, 10) || 2;
            const timer = timers.find(t => t.id === id);
            if (timer) {
                timer.duration = mins * 60;
                timer.remaining = timer.duration;
                timer.status = 'running';

                // If this was the pinned card, exit focus mode
                if (timer.isPinned) {
                    timer.isPinned = false;
                    isFocusMode = false;
                    timerList.classList.remove('focus-mode');
                }

                const card = document.getElementById(`timer-${timer.id}`);
                if (card) {
                    card.remove();
                }
                renderTimer(timer);
                startCountdown(timer);
                updateTimerStatus();
            }
            return;
        }

        // Show modal as normal
        currentEditTimerId = id;
        const modal = document.getElementById('modalOverlay');
        const input = document.getElementById('modalInput');
        const timer = timers.find(t => t.id === id);
        if (timer) {
            input.value = Math.ceil(timer.duration / 60);
        }
        modal.classList.add('active');
        input.focus();
        input.select();
    }

    function closeModal() {
        const modal = document.getElementById('modalOverlay');
        modal.classList.remove('active');
        currentEditTimerId = null;
    }

    async function getClipboardText() {
        try {
            return await navigator.clipboard.readText();
        } catch (err) {
            return null;
        }
    }

    function confirmNewDuration() {
        if (currentEditTimerId === null) return;

        const input = document.getElementById('modalInput');
        const mins = parseInt(input.value, 10);
        if (!mins || mins <= 0) {
            alert('Please enter a valid duration');
            return;
        }

        const timer = timers.find(t => t.id === currentEditTimerId);
        if (timer) {
            timer.duration = mins * 60;
            timer.remaining = timer.duration;
            timer.status = 'running';

            // If this was the pinned card, exit focus mode
            if (timer.isPinned) {
                timer.isPinned = false;
                isFocusMode = false;
                timerList.classList.remove('focus-mode');
            }

            // Re-render the timer card
            const card = document.getElementById(`timer-${timer.id}`);
            if (card) {
                card.remove();
            }
            renderTimer(timer);

            // Auto restart the countdown
            startCountdown(timer);
            updateTimerStatus();
        }

        closeModal();
    }

    function openEditModal(id) {
        const timer = timers.find(t => t.id === id);
        if (!timer) return;

        currentEditTimerId = id;
        const modal = document.getElementById('editModal');
        const nameInput = document.getElementById('editNameInput');
        const answerInput = document.getElementById('editAnswerInput');

        nameInput.value = timer.originalName.replaceAll("~~", "").replaceAll("~^", "").replaceAll("~^", "").replaceAll("~*", "");
        ;
        answerInput.value = timer.answer || '';

        modal.classList.add('active');
        nameInput.focus();
        nameInput.select();
    }

    function closeEditModal() {
        const modal = document.getElementById('editModal');
        modal.classList.remove('active');
        currentEditTimerId = null;
    }

    function match2result(match) {
        const words = match.split(" ");
        const result = words.map((w, i) => {
            if (match.startsWith("^")) {
                // 只显示首个单词的首字母，其它仅显示长度
                // if (i === 0 || i === 1) {
                //     return i === 0 ? w[1] + (w.length - 1) : w[0] + w.length
                // } else {
                //     return w.length
                // }

                // 显示完整的首单词，第二个单词的首字母以及一些虚词，其它仅显示长度
                if (i === 0) {
                    return w.substring(1) + " "
                } else if (stopWords.includes(w)) {
                    return w + " "
                } else if (i === 1 || i === words.length - 1) {
                    return w[0] + w.length + (w.endsWith(",") ? ", " : " ")
                } else {
                    return w.length + (w.endsWith(",") ? ", " : " ")
                }
            } else if (match.startsWith("*")) {
                if (i === 0) {
                    return w[1] + (w.length - 1)
                } else {
                    return w[0] + w.length
                }
            } else {
                return w.length
            }
        }).join(" ").trim()
        return result
    }

    function confirmEdit() {
        if (currentEditTimerId === null) return;

        const nameInput = document.getElementById('editNameInput');
        const answerInput = document.getElementById('editAnswerInput');
        const newName = nameInput.value.trim();
        let newAnswer = answerInput.value.trim();

        if (!newName) {
            alert('Please enter a card name');
            return;
        }

        const timer = timers.find(t => t.id === currentEditTimerId);
        let name = newName
        if (timer) {//1
            if (name.includes("~~") || name.includes("::")) {
                if (name.includes("::") && !name.includes("~~")) {
                    const subNames = name.split("::")
                    name = subNames[0].trim() + "::" + `~${subNames[1].trim()}~~`
                }
                // 1. 提取所有 {{...}} 里的内容
                const matches = [...name.matchAll(/~(.*?)~~/g)].map(m => m[1]);
                // matches = ["extracting", "arrays", "objects"]

                // 2. 把 {{...}} 替换成 ____
                if (name.includes(" → ") || name.includes(" / ")) {
                    name = name.replace(/~.*?~~/g, '____');
                    matches.forEach(match => {
                        name = name.replace("____", match2result(match))
                    })
                } else {
                    name = name.replace(/~.*?~~/g, '____');
                }

                // 3. 拼成想要的格式（题目里没明确最后输出格式，这里按示例来）
                newAnswer = matches.map(word => `"${word.startsWith("*") || word.startsWith("^") ? word.slice(1) : word}"`).join(', ');
            }


            timer.name = name
            timer.answer = newAnswer;

            // Re-render the timer card
            const card = document.getElementById(`timer-${timer.id}`);
            if (card) {
                card.remove();
            }
            renderTimer(timer);
        }

        closeEditModal();
    }

    // Close edit modal on Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
            closeEditModal();
        }
    });

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'modalOverlay') {
            closeModal();
        }
    });
</script>
