<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #fff;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #2a2a2a;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #ff0000;
        }
        input[type="text"]::placeholder {
            color: #666;
        }
        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: #ff0000;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #cc0000;
        }
        button:active {
            transform: scale(0.98);
        }
        #player {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .placeholder {
            display: none;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            border-radius: 12px;
            background: #2a2a2a;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 18px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>YouTube Shorts</h1>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="输入 YouTube Shorts 链接...">
        <button id="playBtn">播放</button>
        <button id="pasteBtn">粘贴播放</button>
    </div>
    <div class="container">
        <div id="player"></div>
        <div id="placeholder" class="placeholder">输入链接后点击播放</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let playerReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            playerReady = true;
            document.getElementById('playBtn').addEventListener('click', loadVideo);
            document.getElementById('urlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loadVideo();
            });
            document.getElementById('pasteBtn').addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        document.getElementById('urlInput').value = text;
                        loadVideo();
                        const container = document.getElementById('player');
                        container.requestFullscreen();
                    }
                } catch (err) {
                    alert('无法读取剪贴板，请手动粘贴链接');
                }
            });
            document.body.addEventListener('click', () => {
                document.body.focus();
            });
        }

        document.addEventListener('keydown', (e) => {
            if (!player || !playerReady) return;
            const tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA') return;
            const currentTime = player.getCurrentTime();
            if (e.key === 'a' || e.key === 'A') {
                player.seekTo(Math.max(currentTime - 2, 0), true);
            } else if (e.key === 'd' || e.key === 'D') {
                player.seekTo(currentTime + 2, true);
            } else if (e.key === 's' || e.key === 'S') {
                if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            } else if (e.key === 'f' || e.key === 'F') {
                const container = document.getElementById('player');
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    container.requestFullscreen();
                }
            }
        });

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/shorts\/)([^&\?\/]+)/,
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\?\/]+)/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function loadVideo() {
            if (!playerReady) return;
            const url = document.getElementById('urlInput').value.trim();
            const videoId = extractVideoId(url);
            if (!videoId) {
                alert('请输入有效的 YouTube Shorts 链接');
                return;
            }
            document.getElementById('placeholder').style.display = 'none';
            player.loadVideoById(videoId);
        }
    </script>
</body>
</html>
